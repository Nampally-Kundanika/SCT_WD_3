<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Command Battle</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1 class="game-title">🌌 Space Tic-Tac-Toe</h1>
        <p class="subtitle">Rockets vs Planets - Who rules the galaxy?</p>

        <div class="mode-selector">
            <label for="gameMode">Game Mode:</label>

            <select id="gameMode">
                <option value="pvp">👥 Player vs Player</option>
                <option value="pvc">🤖 Player vs Computer</option>
            </select>
        </div>

        <div class="scoreboard">

            <div class="score-card">
                <span class="score-icon">🚀</span>
                <span class="score-label">Rockets</span>
                <span class="score-value" id="scoreX">0</span>
            </div>

            <div class="score-card draws">
                <span class="score-icon">🤝</span>
                <span class="score-label">Draws</span>
                <span class="score-value" id="scoreDraw">0</span>
            </div>

            <div class="score-card">
                <span class="score-icon">🪐</span>
                <span class="score-label">Planets</span>
                <span class="score-value" id="scoreO">0</span>
            </div>

        </div>

        <div class="turn-display" id="turnDisplay">
            🚀 Rocket's Turn
        </div>

        <div class="board" id="board">

            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>

            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>

            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>

        </div>

        <div class="status-message hidden" id="statusMessage"></div>

        <div class="controls">

            <button class="btn btn-secondary" id="resetBtn">
                🔄 Play Again
            </button>

            <button class="btn btn-primary" id="newMatchBtn">
                ✨ New Match
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
